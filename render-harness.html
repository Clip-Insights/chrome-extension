<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clip Insights — render harness</title>
    <!-- Links the REAL stylesheet so what renders matches the extension exactly.
         :host{all:initial} simply doesn't match outside a shadow root; the
         #clip-insights-notepad scoped rules do all the work. -->
    <link rel="stylesheet" href="./src/ui/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #0f1020;
        font-family: 'Roboto', system-ui, sans-serif;
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
        align-items: flex-start;
      }
      .stage {
        width: 360px; /* realistic YouTube sidebar panel width */
      }
      .stage--narrow { width: 320px; }
      .label {
        color: #cdd0e6;
        font-size: 12px;
        font-weight: 600;
        margin: 0 0 8px 2px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <!-- icon definitions reused via <use> -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <g id="i-snapshot" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.4"/></g>
        <g id="i-summary" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h5"/></g>
        <g id="i-keypoints" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6h9"/><path d="M11 12h9"/><path d="M11 18h9"/><path d="m3 6 1.4 1.4L7 4.8"/><path d="m3 12 1.4 1.4L7 10.8"/><path d="m3 18 1.4 1.4L7 16.8"/></g>
        <g id="i-chat" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-3.4-.7L3 21l1.4-4.6A8.4 8.4 0 0 1 3.6 11a8.4 8.4 0 0 1 8.4-8 8.4 8.4 0 0 1 9 8.5Z"/><path d="M8.5 11h.01M12 11h.01M15.5 11h.01"/></g>
        <g id="i-download" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></g>
        <g id="i-upload" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/></g>
        <g id="i-transcript" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 11h3"/><path d="M7 15h2"/><path d="M14 11h3"/><path d="M13 15h4"/></g>
        <g id="i-clear" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-.8 13a2 2 0 0 1-2 1.9H7.8a2 2 0 0 1-2-1.9L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></g>
        <g id="i-login" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></g>
        <g id="i-logout" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></g>
        <g id="i-add" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></g>
        <g id="i-eye" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.06 12.35a1 1 0 0 1 0-.7C3.42 8.1 7.36 5 12 5s8.58 3.1 9.94 6.65a1 1 0 0 1 0 .7C20.58 15.9 16.64 19 12 19s-8.58-3.1-9.94-6.65Z"/><circle cx="12" cy="12" r="3"/></g>
        <g id="i-more" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></g>
        <g id="i-close" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></g>
        <g id="i-info" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></g>
        <g id="i-bolt"><path d="M13 2 4.5 13.2a.6.6 0 0 0 .5.9H11l-1 7.9 8.5-11.9a.6.6 0 0 0-.5-1H13l1-7.1Z" fill="currentColor"/></g>
        <g id="i-send" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 18 9-18 9 4-9-4-9Z"/><path d="M7 12h14"/></g>
        <g id="i-settings" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></g>
        <g id="i-refresh" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></g>
        <g id="i-sparkles" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v2.5M12 18.5V21M4.2 4.2l1.8 1.8M18 18l1.8 1.8M3 12h2.5M18.5 12H21M4.2 19.8 6 18M18 6l1.8-1.8"/><circle cx="12" cy="12" r="3.5"/></g>
      </defs>
    </svg>

    <script>
      const LOGO = `<svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect x="0" y="0" width="28" height="28" rx="12" fill="#1C1C1C"/><g transform="rotate(-45 14 14) scale(0.75)"><rect x="11" y="10" width="20" height="3" fill="#FFFFFF" rx="1"/><rect x="4" y="17" width="20" height="3" fill="#FFFFFF" rx="1"/><rect x="11" y="24" width="20" height="3" fill="#FFFFFF" rx="1"/></g></svg>`;
      const ic = (id, w = 19) => `<svg width="${w}" height="${w}" viewBox="0 0 24 24" fill="none"><use href="#${id}"/></svg>`;
      const SHOT = "data:image/svg+xml;utf8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="320" height="180" fill="#2b2f52"/><circle cx="160" cy="78" r="34" fill="#5663c9"/><rect x="60" y="130" width="200" height="10" rx="5" fill="#454b86"/></svg>');

      function header(loggedIn = false) {
        const icon = loggedIn ? ic('i-settings',14) : ic('i-login',14);
        const label = loggedIn ? 'Settings' : 'Login';
        return `<div id="clipinsights__top-container">
          <a id="clipinsights__logo"><div id="clipinsights__mainHeading">${LOGO}Clip Insights</div></a>
          <button id="clipinsights__loginBtn" class="clipinsights__button">${icon}<span>${label}</span></button>
        </div>`;
      }
      // Compact view header shared by summary / key points / chat / settings.
      function viewHeader(iconId, title, withInsightActions = false) {
        const actions = withInsightActions
          ? `<button class="clipinsights__iconBtn">${ic('i-refresh',13)}</button>
             <button class="clipinsights__iconBtn clipinsights__iconBtn--danger">${ic('i-clear',13)}</button>`
          : '';
        return `<div class="clipinsights__viewHeader">
          <span class="clipinsights__viewIcon">${ic(iconId,13)}</span>
          <h2 class="clipinsights__viewTitle">${title}</h2>
          <div class="clipinsights__viewActions">${actions}<button class="clipinsights__iconBtn">${ic('i-close',13)}</button></div>
        </div>`;
      }
      function topActions() {
        return `<div class="clipinsights__button-container">
          <button class="clipinsights__button">${ic('i-snapshot')}<span>Snapshot</span></button>
          <button class="clipinsights__button">${ic('i-summary')}<span>Summary</span></button>
          <button class="clipinsights__button">${ic('i-keypoints')}<span>Key Points</span></button>
          <button class="clipinsights__button">${ic('i-chat')}<span>Chat</span></button>
        </div>`;
      }
      function bottomActions() {
        return `<div id="clipinsights__loginBtnContainer">
          <button class="clipinsights__button">${ic('i-download')}<span>Download</span></button>
          <button class="clipinsights__button">${ic('i-upload')}<span>Upload</span></button>
          <button class="clipinsights__button">${ic('i-transcript')}<span>Transcript</span></button>
          <button class="clipinsights__button">${ic('i-clear')}<span>Clear</span></button>
        </div>`;
      }
      function noteComposer() {
        return `<div class="clipinsights__input-container">
          <textarea id="clipinsights__noteInput" placeholder="Add a note"></textarea>
          <button class="clipinsights__button" id="clipinsights__addNoteBtn">${ic('i-add',16)}</button>
        </div>`;
      }
      function timeline() {
        return `<div id="clipinsights__screenshotNoteContainer">
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-actions"><button class="clipinsights__delete-btn">${ic('i-close',9)}</button></div>
            <img class="clipinsights__screenshot" src="${SHOT}" alt="frame"/>
            <button class="clipinsights__timestamp">12:04</button>
          </div>
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-menu"><button class="clipinsights__note-menu-btn">${ic('i-more',14)}</button></div>
            <p class="clipinsights__note">This is where the author explains the .claude directory.
And this second line was added with Shift+Enter.</p>
            <button class="clipinsights__timestamp">13:20</button>
          </div>
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-menu"><button class="clipinsights__note-menu-btn">${ic('i-more',14)}</button></div>
            <p class="clipinsights__note">Nice to have this — plan mode walkthrough starts here.</p>
            <button class="clipinsights__timestamp">15:58</button>
          </div>
        </div>`;
      }
      function statusBar(text) {
        return `<div class="clipinsights__statusBar">
          <div class="clipinsights__contextInfo"><span class="clipinsights__contextIcon">${ic('i-info',12)}</span><span class="clipinsights__contextText">${text}</span></div>
          <div class="clipinsights__limitBadge">${ic('i-bolt',10)}<span class="clipinsights__limitCount">4</span></div>
        </div>`;
      }
      function chatComposer() {
        return `<div id="clipinsights__chatInputContainer">
          <textarea id="clipinsights__chatInput" rows="1" placeholder="Ask about this video…"></textarea>
          <button class="clipinsights__button" id="clipinsights__sendChatBtn">${ic('i-send',16)}</button>
        </div>`;
      }

      // Markdown answer mirroring core/markdown.ts output (marked + DOMPurify).
      const MD_ANSWER = `<div class="clipinsights__md">
        <p>He covers <strong>three main areas</strong> in the first hour:</p>
        <ul><li>Setting up the <code>CLAUDE.md</code> project brain</li><li>Building a small web app live</li><li>Plan mode &amp; permissions</li></ul>
        <table><thead><tr><th>Section</th><th>Time</th></tr></thead><tbody><tr><td>Setup</td><td>0:00–12:30</td></tr><tr><td>Live build</td><td>12:30–41:00</td></tr></tbody></table>
        <blockquote><p>"Learn by doing, not by watching."</p></blockquote>
        <pre><code>npm install
npm run dev</code></pre>
        <p>After that he moves on to hooks and slash commands</p>
      </div><span class="clipinsights__caret"></span>`;

      const panels = {
        Main: `<div id="clipinsights__body">${header()}<div id="clipinsights__mainContent">${topActions()}${noteComposer()}${timeline()}${bottomActions()}</div></div>`,

        'Chat — markdown streaming': `<div id="clipinsights__body">${header(true)}<div id="clipinsights__chatContainer">
          ${viewHeader('i-chat','Clip Bot')}
          ${statusBar('Context up to 41.20 min')}
          <div id="clipinsights__chatMessages">
            <div class="clipinsights__message clipinsights__user">What does he cover in the first hour?
Also: any tables?</div>
            <div class="clipinsights__message clipinsights__bot">${MD_ANSWER}</div>
          </div>
          ${chatComposer()}
        </div></div>`,

        'Chat — thinking': `<div id="clipinsights__body">${header(true)}<div id="clipinsights__chatContainer">
          ${viewHeader('i-chat','Clip Bot')}
          ${statusBar('Context up to 41.20 min')}
          <div id="clipinsights__chatMessages">
            <div class="clipinsights__message clipinsights__user">Summarize the section on hooks.</div>
            <div class="clipinsights__message clipinsights__bot"><span class="clipinsights__typing"><span></span><span></span><span></span></span></div>
          </div>
          ${chatComposer()}
        </div></div>`,

        Summary: `<div id="clipinsights__body">${header(true)}<div id="clipinsights__summaryContainer">
          ${viewHeader('i-summary','Summary', true)}
          ${statusBar('Full video context')}
          <div id="clipinsights__summary"><div class="clipinsights__md">
            <p><strong>Overview.</strong> This course is a practical, build-first walkthrough of Claude Code. It opens by getting everyone on the same page, then sets up the project brain — the <code>CLAUDE.md</code> file — before building a small web app that is hosted live.</p>
            <p>Later sections cover the cloud directory, the subagents folder, plan mode, permissions and how to use them safely, context management to avoid context rot, every slash command, and hooks for firing custom scripts automatically.</p>
          </div></div>
        </div></div>`,

        'Summary — empty (generate)': `<div id="clipinsights__body">${header(true)}<div id="clipinsights__summaryContainer">
          ${viewHeader('i-summary','Summary')}
          ${statusBar('Ready when you are')}
          <div id="clipinsights__summary">
            <div class="clipinsights__insightsEmpty">
              <span class="clipinsights__insightsEmptyIcon">${ic('i-sparkles',18)}</span>
              <p class="clipinsights__insightsEmptyTitle">No summary yet</p>
              <p class="clipinsights__insightsEmptyText">Generate an AI summary of this video from its transcript. It's saved here for next time.</p>
              <button class="clipinsights__btnPrimary">Generate summary</button>
            </div>
          </div>
        </div></div>`,

        'Key Points': `<div id="clipinsights__body">${header(true)}<div id="clipinsights__keypointsContainer">
          ${viewHeader('i-keypoints','Key Points', true)}
          ${statusBar('Full video context')}
          <div id="clipinsights__keypoints"><ul class="styled-keypoints">
            <li>Set up the project brain (cloud.md) before building anything substantial.</li>
            <li>Learn by building a small web app hosted live, not by passive watching.</li>
            <li>Use plan mode for complex builds and review changes before applying.</li>
            <li>Manage context deliberately to avoid context rot and keep prompts high-ROI.</li>
            <li>Hooks let you fire custom scripts automatically at defined lifecycle points.</li>
          </ul></div>
        </div></div>`,

        Settings: `<div id="clipinsights__body">${header(true)}<div id="clipinsights__settingsContainer">
          ${viewHeader('i-settings','Settings')}
          <div id="clipinsights__settingsBody">
            <div class="clipinsights__settingsCard clipinsights__profileCard">
              <span class="clipinsights__avatar">Z</span>
              <div class="clipinsights__profileMeta">
                <p class="clipinsights__profileName">Zubair Ahmed</p>
                <p class="clipinsights__profileEmail">ds.zubair@example.com</p>
              </div>
            </div>
            <div class="clipinsights__settingsCard">
              <div class="clipinsights__settingsCardHead"><h3 class="clipinsights__settingsCardTitle">Plan</h3><span class="clipinsights__planBadge">Pro</span></div>
              <p class="clipinsights__settingsCardText">$4.99/month</p>
              <a class="clipinsights__settingsLink">Manage plan ↗</a>
            </div>
            <div class="clipinsights__settingsCard">
              <div class="clipinsights__settingsCardHead"><h3 class="clipinsights__settingsCardTitle">Today's usage</h3></div>
              <div class="clipinsights__usageMeter">
                <div class="clipinsights__usageMeterHead"><span>Summaries &amp; key points</span><span class="clipinsights__usageMeterCount">3 / 20</span></div>
                <div class="clipinsights__usageTrack"><div class="clipinsights__usageFill" style="width:15%"></div></div>
                <p class="clipinsights__usageReset">Resets in about 4 hours</p>
              </div>
              <div class="clipinsights__usageMeter">
                <div class="clipinsights__usageMeterHead"><span>Chat messages</span><span class="clipinsights__usageMeterCount">40 / 40</span></div>
                <div class="clipinsights__usageTrack"><div class="clipinsights__usageFill full" style="width:100%"></div></div>
                <p class="clipinsights__usageReset">Resets in about 2 hours</p>
              </div>
            </div>
            <button class="clipinsights__logoutBtn">${ic('i-logout',14)}Log out</button>
          </div>
        </div></div>`,

        Login: `<div id="clipinsights__body">${header()}<div id="clipinsights__loginContainer">
          <h4 class="clipinsights__h4">Log in</h4>
          <input class="clipinsights__loginInputs" id="clipinsights__emailInput" placeholder="Email"/>
          <div class="clipinsights__passwordField">
            <input class="clipinsights__loginInputs" placeholder="Password" type="password" value="hunter2secret"/>
            <button type="button" class="clipinsights__passwordToggle">${ic('i-eye',15)}</button>
          </div>
          <button class="clipinsights__button clipinsights__btnPrimary clipinsights__btnBlock" id="clipinsights__submitLogin">Log in</button>
          <div class="clipinsights__loginDivider"><span>or</span></div>
          <button class="clipinsights__button clipinsights__googleBtn" id="clipinsights__googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span>Sign in with Google</span>
          </button>
          <p id="clipinsights__registrationLink">Don't have an account?<a>Register!</a></p>
          <button class="clipinsights__button clipinsights__btnGhost">Back</button>
        </div></div>`,

        'Sign-up gate': `<div id="clipinsights__body">${header()}<div id="clipinsights__loginContainer" class="clipinsights__signupPrompt">
          <h4 class="clipinsights__h4">Create a free account</h4>
          <p class="clipinsights__signupText">AI summaries are included free with a Clip Insights account — along with AI chat, key points and cloud PDF storage. Notes, screenshots and downloads stay free without one.</p>
          <div class="clipinsights__signupActions">
            <a class="clipinsights__button clipinsights__btnPrimary clipinsights__btnBlock">Sign up free</a>
            <button class="clipinsights__button clipinsights__btnSecondary clipinsights__btnBlock">I already have an account</button>
            <button class="clipinsights__button clipinsights__btnGhost">Not now</button>
          </div>
        </div></div>`,
      };

      for (const [label, html] of Object.entries(panels)) {
        const stage = document.createElement('div');
        stage.className = 'stage';
        stage.innerHTML = `<p class="label">${label}</p><div id="clip-insights-notepad">${html}</div>`;
        document.body.appendChild(stage);
      }
      // one narrow copy of Main to confirm no overflow / no ellipsis at 320px
      const narrow = document.createElement('div');
      narrow.className = 'stage stage--narrow';
      narrow.innerHTML = `<p class="label">Main @ 320px</p><div id="clip-insights-notepad">${panels.Main}</div>`;
      document.body.appendChild(narrow);
    </script>
  </body>
</html>
