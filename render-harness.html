<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clip Insights — render harness</title>
    <!-- Links the REAL stylesheet so what renders matches the extension exactly.
         :host{all:initial} simply doesn't match outside a shadow root; the
         #clip-insights-notepad scoped rules do all the work. -->
    <link rel="stylesheet" href="./src/ui/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #0f1020;
        font-family: 'Roboto', system-ui, sans-serif;
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
        align-items: flex-start;
      }
      .stage {
        width: 360px; /* realistic YouTube sidebar panel width */
      }
      .stage--narrow { width: 320px; }
      .label {
        color: #cdd0e6;
        font-size: 12px;
        font-weight: 600;
        margin: 0 0 8px 2px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <!-- icon definitions reused via <use> -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <g id="i-snapshot" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.4"/></g>
        <g id="i-summary" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h5"/></g>
        <g id="i-keypoints" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6h9"/><path d="M11 12h9"/><path d="M11 18h9"/><path d="m3 6 1.4 1.4L7 4.8"/><path d="m3 12 1.4 1.4L7 10.8"/><path d="m3 18 1.4 1.4L7 16.8"/></g>
        <g id="i-chat" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-3.4-.7L3 21l1.4-4.6A8.4 8.4 0 0 1 3.6 11a8.4 8.4 0 0 1 8.4-8 8.4 8.4 0 0 1 9 8.5Z"/><path d="M8.5 11h.01M12 11h.01M15.5 11h.01"/></g>
        <g id="i-download" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></g>
        <g id="i-upload" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/></g>
        <g id="i-transcript" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 11h3"/><path d="M7 15h2"/><path d="M14 11h3"/><path d="M13 15h4"/></g>
        <g id="i-clear" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-.8 13a2 2 0 0 1-2 1.9H7.8a2 2 0 0 1-2-1.9L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></g>
        <g id="i-login" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></g>
        <g id="i-add" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></g>
        <g id="i-more" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></g>
        <g id="i-close" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></g>
        <g id="i-info" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></g>
        <g id="i-bolt"><path d="M13 2 4.5 13.2a.6.6 0 0 0 .5.9H11l-1 7.9 8.5-11.9a.6.6 0 0 0-.5-1H13l1-7.1Z" fill="currentColor"/></g>
      </defs>
    </svg>

    <script>
      const LOGO = `<svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect x="0" y="0" width="28" height="28" rx="12" fill="#1C1C1C"/><g transform="rotate(-45 14 14) scale(0.75)"><rect x="11" y="10" width="20" height="3" fill="#FFFFFF" rx="1"/><rect x="4" y="17" width="20" height="3" fill="#FFFFFF" rx="1"/><rect x="11" y="24" width="20" height="3" fill="#FFFFFF" rx="1"/></g></svg>`;
      const ic = (id, w = 19) => `<svg width="${w}" height="${w}" viewBox="0 0 24 24" fill="none"><use href="#${id}"/></svg>`;
      const SHOT = "data:image/svg+xml;utf8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="320" height="180" fill="#2b2f52"/><circle cx="160" cy="78" r="34" fill="#5663c9"/><rect x="60" y="130" width="200" height="10" rx="5" fill="#454b86"/></svg>');

      function header() {
        return `<div id="clipinsights__top-container">
          <a id="clipinsights__logo"><div id="clipinsights__mainHeading">${LOGO}Clip Insights</div></a>
          <button id="clipinsights__loginBtn" class="clipinsights__button">${ic('i-login',14)}<span>Login</span></button>
        </div>`;
      }
      function topActions() {
        return `<div class="clipinsights__button-container">
          <button class="clipinsights__button">${ic('i-snapshot')}<span>Snapshot</span></button>
          <button class="clipinsights__button">${ic('i-summary')}<span>Summary</span></button>
          <button class="clipinsights__button">${ic('i-keypoints')}<span>Key Points</span></button>
          <button class="clipinsights__button">${ic('i-chat')}<span>Chat</span></button>
        </div>`;
      }
      function bottomActions() {
        return `<div id="clipinsights__loginBtnContainer">
          <button class="clipinsights__button">${ic('i-download')}<span>Download</span></button>
          <button class="clipinsights__button">${ic('i-upload')}<span>Upload</span></button>
          <button class="clipinsights__button">${ic('i-transcript')}<span>Transcript</span></button>
          <button class="clipinsights__button">${ic('i-clear')}<span>Clear</span></button>
        </div>`;
      }
      function noteComposer() {
        return `<div class="clipinsights__input-container">
          <textarea id="clipinsights__noteInput" placeholder="Add a note"></textarea>
          <button class="clipinsights__button" id="clipinsights__addNoteBtn">${ic('i-add',15)}</button>
        </div>`;
      }
      function timeline() {
        return `<div id="clipinsights__screenshotNoteContainer">
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-actions"><button class="clipinsights__delete-btn">${ic('i-close',12)}</button></div>
            <img class="clipinsights__screenshot" src="${SHOT}" alt="frame"/>
            <p class="clipinsights__timestamp">12:04</p>
          </div>
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-menu"><button class="clipinsights__note-menu-btn">${ic('i-more',14)}</button></div>
            <p class="clipinsights__note">This is where the author explains the .claude directory and how subagents are configured.</p>
            <p class="clipinsights__timestamp">13:20</p>
          </div>
          <div class="clipinsights__screenshot-note">
            <div class="clipinsights__note-menu"><button class="clipinsights__note-menu-btn">${ic('i-more',14)}</button></div>
            <p class="clipinsights__note">Nice to have this — plan mode walkthrough starts here.</p>
            <p class="clipinsights__timestamp">15:58</p>
          </div>
        </div>`;
      }
      function statusBar(text) {
        return `<div class="clipinsights__statusBar">
          <div class="clipinsights__contextInfo"><span class="clipinsights__contextIcon">${ic('i-info',12)}</span><span class="clipinsights__contextText">${text}</span></div>
          <div class="clipinsights__limitBadge">${ic('i-bolt',10)}<span class="clipinsights__limitCount">4</span></div>
        </div>`;
      }

      const panels = {
        Main: `<div id="clipinsights__body">${header()}<div id="clipinsights__mainContent">${topActions()}${noteComposer()}${timeline()}${bottomActions()}</div></div>`,

        'Chat — streaming': `<div id="clipinsights__body">${header()}<div id="clipinsights__chatContainer">
          <div id="clipinsights__chatHeader"><h4 class="clipinsights__h4">Clip Bot</h4><button class="clipinsights__button" id="clipinsights__closeChat">✖</button></div>
          ${statusBar('Context up to 41.20 min')}
          <div id="clipinsights__chatMessages">
            <div class="clipinsights__message clipinsights__user">What does he cover in the first hour?</div>
            <div class="clipinsights__message clipinsights__bot">In the first hour he sets up the project brain (the cloud.md file), then builds a small web app live to show practical workflows<span class="clipinsights__caret"></span></div>
          </div>
          <div id="clipinsights__chatInputContainer"><input id="clipinsights__chatInput" placeholder="Type a message..."/><button class="clipinsights__button" id="clipinsights__sendChatBtn">Send</button></div>
        </div></div>`,

        'Chat — thinking': `<div id="clipinsights__body">${header()}<div id="clipinsights__chatContainer">
          <div id="clipinsights__chatHeader"><h4 class="clipinsights__h4">Clip Bot</h4><button class="clipinsights__button" id="clipinsights__closeChat">✖</button></div>
          ${statusBar('Context up to 41.20 min')}
          <div id="clipinsights__chatMessages">
            <div class="clipinsights__message clipinsights__user">Summarize the section on hooks.</div>
            <div class="clipinsights__message clipinsights__bot"><span class="clipinsights__typing"><span></span><span></span><span></span></span></div>
          </div>
          <div id="clipinsights__chatInputContainer"><input id="clipinsights__chatInput" placeholder="Type a message..."/><button class="clipinsights__button" id="clipinsights__sendChatBtn">Send</button></div>
        </div></div>`,

        Summary: `<div id="clipinsights__body">${header()}<div id="clipinsights__summaryContainer">
          <div id="clipinsights__summaryHeader"><h2 id="clipinsights__summaryHeading">📄Summary</h2><button class="clipinsights__button" id="clipinsights__closeSummary">✖</button></div>
          ${statusBar('Full video context')}
          <div id="clipinsights__summary"><strong>Overview.</strong> This course is a practical, build-first walkthrough of Claude Code. It opens by getting everyone on the same page, then sets up the project brain — the cloud.md file — before building a small web app that is hosted live. The instructor emphasizes learning by doing rather than passively watching. Later sections cover the cloud directory, the subagents folder, plan mode, dangerously-skip-permissions and how to use it safely, context management to avoid context rot, every slash command, and hooks for firing custom scripts automatically.</div>
        </div></div>`,

        'Key Points': `<div id="clipinsights__body">${header()}<div id="clipinsights__keypointsContainer">
          <div id="clipinsights__keyPointsHeader"><h2 id="clipinsights__keypointsHeading">🔹Key Points</h2><button class="clipinsights__button" id="clipinsights__closeKeyPoints">✖</button></div>
          ${statusBar('Full video context')}
          <div id="clipinsights__keypoints"><ul class="styled-keypoints">
            <li>Set up the project brain (cloud.md) before building anything substantial.</li>
            <li>Learn by building a small web app hosted live, not by passive watching.</li>
            <li>Use plan mode for complex builds and review changes before applying.</li>
            <li>Manage context deliberately to avoid context rot and keep prompts high-ROI.</li>
            <li>Hooks let you fire custom scripts automatically at defined lifecycle points.</li>
          </ul></div>
        </div></div>`,

        Login: `<div id="clipinsights__body">${header()}<div id="clipinsights__loginContainer">
          <h4 class="clipinsights__h4">Login</h4>
          <input class="clipinsights__loginInputs" id="clipinsights__emailInput" placeholder="Email"/>
          <input class="clipinsights__loginInputs" placeholder="Password" type="password"/>
          <div id="clipinsights__submitBackBtns"><button class="clipinsights__button" id="clipinsights__submitLogin">Login</button><button class="clipinsights__button" id="clipinsights__backBtn">Back</button></div>
          <p id="clipinsights__registrationLink">Don't have an account?<a>Register!</a></p>
        </div></div>`,
      };

      for (const [label, html] of Object.entries(panels)) {
        const stage = document.createElement('div');
        stage.className = 'stage';
        stage.innerHTML = `<p class="label">${label}</p><div id="clip-insights-notepad">${html}</div>`;
        document.body.appendChild(stage);
      }
      // one narrow copy of Main to confirm no overflow / no ellipsis at 320px
      const narrow = document.createElement('div');
      narrow.className = 'stage stage--narrow';
      narrow.innerHTML = `<p class="label">Main @ 320px</p><div id="clip-insights-notepad">${panels.Main}</div>`;
      document.body.appendChild(narrow);
    </script>
  </body>
</html>
