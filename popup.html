    <div id="clipinsights__summary" style="white-space: pre-wrap;"></div>
  </div>

  <!-- Key Points section -->
  <div id="clipinsights__keypointsContainer" style="display: none;">
    <div id="clipinsights__keyPointsHeader">
      <h2 id="clipinsights__keypointsHeading">🔹Key Points</h2>
      <button class="clipinsights__button" id="clipinsights__closeKeyPoints">✖<span class="clipinsights__btnTooltip">Close</span></button>
    </div>
    <div class="clipinsights__statusBar" id="clipinsights__keypointsStatusBar">
      <div class="clipinsights__contextInfo">
        <svg class="clipinsights__contextIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span class="clipinsights__contextText" id="clipinsights__keypointsContextText">Analyzing video...</span>
      </div>
      <div class="clipinsights__limitBadge" id="clipinsights__keypointsLimitBadge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <span class="clipinsights__limitCount" id="clipinsights__keypointsLimitCount">5</span>
        <span class="clipinsights__limitTooltip">Daily key points remaining</span>
      </div>
    </div>
    <div id="clipinsights__keypoints" style="white-space: pre-wrap;"></div>
  </div>

  <!-- Login section -->
  <div id="clipinsights__loginContainer">
    <h4 class="clipinsights__h4">Login</h4>
    <input type="email" placeholder="Email" id="clipinsights__emailInput" class="clipinsights__loginInputs" />
    <input type="password" placeholder="Password" id="clipinsights__passwordInput" class="clipinsights__loginInputs" />
    <div id="clipinsights__submitBackBtns">
      <button class="clipinsights__button" id="clipinsights__submitLogin">Login<span class="clipinsights__btnTooltip">Sign in</span></button>
      <button class="clipinsights__button" id="clipinsights__backBtn" class="clipinsights__back-btn">Back<span class="clipinsights__btnTooltip">Go back</span></button>
    </div>
    <p id="clipinsights__registrationLink">Don't have an account?<a
        href="https://app.clipinsights.com/signup">Register!</a></p>
  </div>

  <div id="clipinsights__chatContainer" style="display: none;">
    <div id="clipinsights__chatHeader">
      <h4 class="clipinsights__h4">Clip Bot</h4>
      <button class="clipinsights__button" id="clipinsights__closeChat">✖<span class="clipinsights__btnTooltip">Close</span></button>
    </div>
    <div id="clipinsights__chatStatusBar">
      <div id="clipinsights__contextInfo">
        <svg id="clipinsights__contextIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span id="clipinsights__contextTime">Analyzing video...</span>
      </div>
      <div id="clipinsights__limitBadge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <span id="clipinsights__limitCount">10</span>
        <span id="clipinsights__limitTooltip">Daily chats remaining</span>
      </div>
    </div>
    <div id="clipinsights__chatMessages"></div>
    <div id="clipinsights__chatInputContainer">
      <input type="text" id="clipinsights__chatInput" placeholder="Type a message..." />
      <button class="clipinsights__button" id="clipinsights__sendChatBtn">Send<span class="clipinsights__btnTooltip">Send message</span></button>
    </div>
  </div>


  <script src="popup.js"></script>
</body>

</html>
